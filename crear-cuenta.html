<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="titulo-pagina">crear cuenta</h1>
    <main class="pagina">
        <header>
            <div class="barra-superior">
                <a class="logo-principal" href="index.html"><img src="pclogo.png" alt="PC Gamer"></a>
                <div class="buscador">
                    <input type="search" aria-label="Buscar">
                    <span>⌕</span>
                </div>
                <div class="iconos-header">
                    <a href="iniciar-sesion.html"><img src="bx-user.png" alt="Usuario"></a>
                    <a href="carrito.html"><img src="bx-cart-alt-2.png" alt="Carrito"></a>
                </div>
            </div>
            <nav>
                <a href="productos.html">PRODUCTOS</a>
                <a href="armarpc.html">ARMA TU PC</a>
                <a href="pcarmada.html">PC ARMADAS</a>
                <a href="ayuda.html">AYUDA</a>
            </nav>
        </header>

        <section class="registro">
            <form class="caja-registro">
                <div class="grilla-registro">
                    <div class="campo-formulario">
                        <label for="nombre">Nombre y Apellido</label>
                        <input id="nombre" type="text">
                    </div>
                    <div class="campo-formulario">
                        <label for="registro-email">Email</label>
                        <input id="registro-email" type="email">
                    </div>
                    <div class="campo-formulario">
                        <label for="registro-password">CONTRASEÑA</label>
                        <input id="registro-password" type="password">
                    </div>
                    <div class="campo-formulario">
                        <label for="registro-repetir">Repetir Contraseña</label>
                        <input id="registro-repetir" type="password">
                    </div>
                    <div class="campo-formulario campo-completo">
                        <label for="telefono">Telefono</label>
                        <input id="telefono" type="tel">
                    </div>
                </div>
                <button class="boton" type="submit">Crear Cuenta</button>
            </form>
        </section>

        <footer>
            <h2>Contacto</h2>
            <div class="grilla-contacto">
                <div class="item-contacto">
                    <img src="Whatsapp.png" alt="">
                    <div><small>WhatsApp</small><p>+54 11 2343-3465</p></div>
                </div>
                <div class="item-contacto">
                    <img src="mail(1).png" alt="">
                    <div><small>Empresa</small><a href="#">pcgamingstore@gmail.com</a></div>
                </div>
                <div class="item-contacto">
                    <span class="icono-local"></span>
                    <div><small>Local</small><p>Florida 537 local 379, CABA</p></div>
                </div>
                <div class="item-contacto">
                    <img src="ig.png" alt="">
                    <div><small>Instagram</small><a href="#">@pcgamingstore</a></div>
                </div>
            </div>
            <div class="pie-inferior">
                <span>@PCGAMINGSTORE</span>
                <span>Terminos y Condiciones</span>
            </div>
        </footer>
    </main>
</body>
</html>
